<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SNet Blocker – Site Blocked</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #08090d;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated threat grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,71,87,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,71,87,.04) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridPulse 4s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,71,87,0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: threatGlow 3s ease-in-out infinite;
        }

        @keyframes gridPulse {
            0%,100% { opacity: .5; }
            50%     { opacity: 1; }
        }

        @keyframes threatGlow {
            0%,100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50%     { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        .card {
            position: relative;
            background: rgba(18, 21, 30, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,71,87,.2);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 480px;
            width: 92%;
            text-align: center;
            box-shadow: 0 0 80px rgba(255,71,87,.1), 0 20px 60px rgba(0,0,0,.5);
            animation: cardIn .5s cubic-bezier(.34,1.56,.64,1) both;
        }

        @keyframes cardIn {
            from { opacity:0; transform: scale(.92) translateY(20px); }
            to   { opacity:1; transform: scale(1) translateY(0); }
        }

        .shield-container {
            position: relative;
            width: 88px;
            height: 88px;
            margin: 0 auto 24px;
        }

        .shield {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, #ff6b6b, #c0392b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            box-shadow: 0 0 40px rgba(255,71,87,.4);
            animation: shieldPulse 2s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        .shield-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(255,71,87,.3);
            animation: ringExpand 2s ease-out infinite;
        }

        .shield-ring:nth-child(2) { animation-delay: 0.5s; }
        .shield-ring:nth-child(3) { animation-delay: 1s; }

        @keyframes ringExpand {
            from { transform: scale(1); opacity: 0.6; }
            to   { transform: scale(1.5); opacity: 0; }
        }

        @keyframes shieldPulse {
            0%,100% { box-shadow: 0 0 40px rgba(255,71,87,.4); }
            50%     { box-shadow: 0 0 60px rgba(255,71,87,.6); }
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ff6b6b;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .domain-chip {
            display: inline-block;
            background: rgba(255,71,87,.1);
            border: 1px solid rgba(255,71,87,.25);
            border-radius: 999px;
            padding: 6px 18px;
            font-size: .85rem;
            color: #ff9999;
            margin-bottom: 16px;
            word-break: break-all;
            font-weight: 500;
        }

        .category-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .badge-gambling {
            background: rgba(255, 192, 72, 0.1);
            border: 1px solid rgba(255, 192, 72, 0.2);
            color: #ffc048;
        }

        .badge-adult {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.2);
            color: #ff6b6b;
        }

        .badge-phishing {
            background: rgba(108, 92, 255, 0.1);
            border: 1px solid rgba(108, 92, 255, 0.2);
            color: #8b7aff;
        }

        .badge-default {
            background: rgba(255, 71, 87, 0.08);
            border: 1px solid rgba(255, 71, 87, 0.2);
            color: #fca5a5;
        }

        .reason-box {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,71,87,.06);
            border: 1px solid rgba(255,71,87,.15);
            border-radius: 10px;
            padding: 10px 18px;
            font-size: .85rem;
            color: #fca5a5;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .enforcement-tag {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .enforce-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #5a6375;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .enforce-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #00e5a0;
            box-shadow: 0 0 6px #00e5a0;
        }

        p.sub {
            color: #8b95a5;
            font-size: .85rem;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            border: none;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-back {
            background: rgba(30, 34, 50, 0.8);
            color: #8b95a5;
            border: 1px solid rgba(255,255,255,.08);
        }

        .btn-back:hover {
            background: rgba(40, 45, 65, 0.9);
            color: #e2e8f0;
            border-color: rgba(255,255,255,.15);
        }

        footer {
            margin-top: 28px;
            font-size: .7rem;
            color: #2a3040;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="shield-container">
            <div class="shield-ring"></div>
            <div class="shield-ring"></div>
            <div class="shield-ring"></div>
            <div class="shield">🛡️</div>
        </div>

        <h1>Threat Neutralized</h1>
        <div class="domain-chip" id="domainLabel">unknown domain</div><br/>

        <div id="categoryBadge" class="category-badge badge-default">
            <span>⚠️</span>
            <span id="categoryLabel">Restricted</span>
        </div><br/>

        <div class="reason-box">
            <span>📋</span>
            <span id="reasonLabel">Restricted Content</span>
        </div>

        <div class="enforcement-tag">
            <div class="enforce-item">
                <div class="enforce-dot"></div>
                Firewall
            </div>
            <div class="enforce-item">
                <div class="enforce-dot"></div>
                Hosts File
            </div>
            <div class="enforce-item">
                <div class="enforce-dot"></div>
                Content Filter
            </div>
        </div>

        <p class="sub">
            SNet Blocker detected and neutralized this threat using<br/>
            OS-level firewall enforcement. This domain has been logged.
        </p>

        <button class="btn btn-back" onclick="history.back()">← Go Back Safely</button>
        <footer>SNet Blocker v3.0 • Firewall-Backed Protection</footer>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const domain = params.get("domain") || "unknown domain";
        const reason = params.get("reason") || "Restricted Content";

        document.getElementById("domainLabel").textContent = domain;
        document.getElementById("reasonLabel").textContent = reason;

        // Set category badge
        const badge = document.getElementById("categoryBadge");
        const catLabel = document.getElementById("categoryLabel");
        const reasonLower = reason.toLowerCase();

        if (reasonLower.includes("gambling") || reasonLower.includes("casino") || reasonLower.includes("betting")) {
            badge.className = "category-badge badge-gambling";
            catLabel.textContent = "🎰 Gambling";
        } else if (reasonLower.includes("adult") || reasonLower.includes("porn") || reasonLower.includes("nsfw")) {
            badge.className = "category-badge badge-adult";
            catLabel.textContent = "🔞 Adult Content";
        } else if (reasonLower.includes("phishing") || reasonLower.includes("homograph") || reasonLower.includes("scam")) {
            badge.className = "category-badge badge-phishing";
            catLabel.textContent = "🪤 Phishing/Scam";
        } else if (reasonLower.includes("malware") || reasonLower.includes("trojan")) {
            badge.className = "category-badge badge-phishing";
            catLabel.textContent = "☠️ Malware";
        } else if (reasonLower.includes("manual")) {
            badge.className = "category-badge badge-default";
            catLabel.textContent = "🚫 Manually Blocked";
        } else {
            badge.className = "category-badge badge-default";
            catLabel.textContent = "⛔ Restricted";
        }
    </script>
</body>
</html>
